<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Data Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }
        
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .stats-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #4caf50;
        }
        
        .status-dot.disconnected {
            background: #f44336;
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(76, 175, 80, 0);
            }
        }
        
        canvas {
            max-height: 400px;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Real-time Data Monitor</h1>
            <p>ESP32 Sensor Data Dashboard</p>
        </div>
        
        <div class="dashboard">
            <div class="chart-container">
                <canvas id="realtimeChart"></canvas>
            </div>
            
            <div class="stats-container">
                <h3 style="color: #333; margin-bottom: 10px;">Statistics</h3>
                
                <div class="stat-box">
                    <div class="stat-label">Current Value</div>
                    <div class="stat-value" id="currentValue">--</div>
                </div>
                
                <div class="stat-box">
                    <div class="stat-label">Average</div>
                    <div class="stat-value" id="averageValue">--</div>
                </div>
                
                <div class="stat-box">
                    <div class="stat-label">Max</div>
                    <div class="stat-value" id="maxValue">--</div>
                </div>
                
                <div class="stat-box">
                    <div class="stat-label">Min</div>
                    <div class="stat-value" id="minValue">--</div>
                </div>
                
                <div class="status-indicator">
                    <div class="status-dot connected" id="statusDot"></div>
                    <span id="statusText" style="color: #333;">Connecting...</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const ctx = document.getElementById('realtimeChart').getContext('2d');
        const maxDataPoints = 50;
        const chartData = {
            labels: [],
            datasets: [{
                label: 'Sensor Reading',
                data: [],
                borderColor: '#667eea',
                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 3,
                pointBackgroundColor: '#667eea',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointHoverRadius: 5
            }]
        };
        
        const chart = new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: true,
                        labels: {
                            font: { size: 14 },
                            padding: 15
                        }
                    },
                    title: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        ticks: {
                            font: { size: 12 }
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            font: { size: 12 }
                        }
                    }
                }
            }
        });
        
        // Load initial data
        async function loadInitialData() {
            try {
                const response = await fetch('/api/data');
                const result = await response.json();
                result.data.forEach(point => {
                    addDataPoint(point);
                });
            } catch (error) {
                console.error('Error loading initial data:', error);
            }
        }
        
        // Add data point to chart
        function addDataPoint(dataPoint) {
            chartData.labels.push(dataPoint.timestamp);
            chartData.datasets[0].data.push(dataPoint.value);
            
            if (chartData.labels.length > maxDataPoints) {
                chartData.labels.shift();
                chartData.datasets[0].data.shift();
            }
            
            updateStatistics();
            chart.update('none');
        }
        
        // Update statistics
        function updateStatistics() {
            const data = chartData.datasets[0].data;
            
            if (data.length === 0) return;
            
            const current = data[data.length - 1];
            const avg = (data.reduce((a, b) => a + b, 0) / data.length).toFixed(2);
            const max = Math.max(...data).toFixed(2);
            const min = Math.min(...data).toFixed(2);
            
            document.getElementById('currentValue').textContent = current.toFixed(2);
            document.getElementById('averageValue').textContent = avg;
            document.getElementById('maxValue').textContent = max;
            document.getElementById('minValue').textContent = min;
        }
        
        // Setup Server-Sent Events
        function setupEventStream() {
            const eventSource = new EventSource('/api/stream');
            
            eventSource.onopen = () => {
                document.getElementById('statusDot').className = 'status-dot connected';
                document.getElementById('statusText').textContent = 'Connected';
            };
            
            eventSource.onmessage = (event) => {
                if (event.data === ': heartbeat') return;
                
                const dataPoint = JSON.parse(event.data);
                addDataPoint(dataPoint);
            };
            
            eventSource.onerror = () => {
                document.getElementById('statusDot').className = 'status-dot disconnected';
                document.getElementById('statusText').textContent = 'Disconnected';
                eventSource.close();
                
                setTimeout(setupEventStream, 3000);
            };
        }
        
        // Initialize
        window.addEventListener('load', () => {
            loadInitialData();
            setupEventStream();
        });
    </script>
</body>
</html>
